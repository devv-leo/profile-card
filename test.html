<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .pass {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Profile Card Test Results</h1>
    <div id="test-results"></div>
    
    <h2>Profile Card Preview</h2>
    <iframe src="index.html" title="Profile Card Preview"></iframe>

    <script>
        // Test function to verify all required data-testid attributes
        function runTests() {
            const results = document.getElementById('test-results');
            const tests = [
                { id: 'test-profile-card', name: 'Profile card container' },
                { id: 'test-user-name', name: 'User name' },
                { id: 'test-user-bio', name: 'User biography' },
                { id: 'test-user-time', name: 'Current time' },
                { id: 'test-user-avatar', name: 'User avatar' },
                { id: 'test-user-social-links', name: 'Social links container' },
                { id: 'test-user-social-twitter', name: 'Twitter link' },
                { id: 'test-user-social-github', name: 'GitHub link' },
                { id: 'test-user-social-linkedin', name: 'LinkedIn link' },
                { id: 'test-user-hobbies', name: 'Hobbies list' },
                { id: 'test-user-dislikes', name: 'Dislikes list' }
            ];

            let passCount = 0;
            let failCount = 0;

            // Add info about testing approach
            results.innerHTML += '<div class="test-result info">Testing data-testid attributes in the profile card component...</div>';

            tests.forEach(test => {
                const element = document.querySelector(`[data-testid="${test.id}"]`);
                const testDiv = document.createElement('div');
                testDiv.className = 'test-result';
                
                if (element) {
                    testDiv.className += ' pass';
                    testDiv.textContent = `✓ PASS: ${test.name} (${test.id}) found`;
                    passCount++;
                } else {
                    testDiv.className += ' fail';
                    testDiv.textContent = `✗ FAIL: ${test.name} (${test.id}) NOT found`;
                    failCount++;
                }
                
                results.appendChild(testDiv);
            });

            // Summary
            const summary = document.createElement('div');
            summary.className = 'test-result info';
            summary.innerHTML = `<strong>Test Summary:</strong> ${passCount} passed, ${failCount} failed out of ${tests.length} total tests`;
            results.appendChild(summary);

            // Time functionality test
            setTimeout(() => {
                const timeElement = document.querySelector('[data-testid="test-user-time"]');
                if (timeElement) {
                    const timeValue = parseInt(timeElement.textContent);
                    const currentTime = Date.now();
                    const timeDiff = Math.abs(timeValue - currentTime);
                    
                    const timeTest = document.createElement('div');
                    if (timeDiff < 5000) { // Within 5 seconds
                        timeTest.className = 'test-result pass';
                        timeTest.textContent = `✓ PASS: Time value (${timeValue}) is current (diff: ${timeDiff}ms)`;
                    } else {
                        timeTest.className = 'test-result fail';
                        timeTest.textContent = `✗ FAIL: Time value (${timeValue}) is not current (diff: ${timeDiff}ms)`;
                    }
                    results.appendChild(timeTest);
                }
            }, 1000);
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
